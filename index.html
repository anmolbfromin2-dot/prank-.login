<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prank Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4f46e5,#06b6d4);
}

.card{
width:340px;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 15px 35px rgba(0,0,0,.2);
text-align:center;
}

.logo{
font-size:35px;
font-weight:bold;
margin-bottom:25px;
color:#2563eb;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
outline:none;
}

input:focus{
border-color:#2563eb;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1d4ed8;
}

.footer{
margin-top:20px;
font-size:13px;
color:#666;
}
</style>

</head>
<body>

<div class="card">

<div class="logo">🔒 Secure Login</div>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button onclick="prank()">Login</button>

<div class="footer">
Demo Page
</div>

</div>

<script>

function prank(){

const btn=document.querySelector("button");

btn.disabled=true;
btn.innerHTML="Checking...";

setTimeout(function(){

alert("⚠ SECURITY ALERT ⚠\n\nYour account has been hacked!");

setTimeout(function(){

alert("😂 Relax!\n\nYe sirf ek prank tha.\nKoi bhi username, password ya data save ya send nahi hua.");

btn.disabled=false;
btn.innerHTML="Login";

},1500);

},2000);

}

</script>

</body>
</html>
